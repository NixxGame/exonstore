<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — Exon External</title>
  <link rel="icon" type="image/png" href="/assets/exon.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --accent: #f07a12; --accent-dim: rgba(240,122,18,.15); }

    body {
      min-height: 100vh;
      background: #04050a;
      color: #eef0f6;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    .pnav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 32px;
      background: rgba(4,5,10,.9);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,.06);
      position: sticky; top: 0; z-index: 100;
    }
    .pnav-logo { display: flex; align-items: center; gap: 9px; text-decoration: none; color: #eef0f6; font-weight: 700; font-size: .95rem; }
    .pnav-logo img { width: 26px; height: 26px; border-radius: 7px; }
    .pnav-right { display: flex; align-items: center; gap: 10px; }
    .pnav-back { display: flex; align-items: center; gap: 6px; color: #7a8394; font-size: .82rem; text-decoration: none; padding: 7px 13px; border-radius: 8px; border: 1px solid rgba(255,255,255,.08); background: rgba(255,255,255,.04); transition: all .15s; }
    .pnav-back:hover { color: #eef0f6; background: rgba(255,255,255,.08); }
    .pnav-auth-avatar { width: 32px; height: 32px; border-radius: 50%; border: 2px solid rgba(255,255,255,.1); cursor: pointer; object-fit: cover; }

    /* ── HERO ── */
    .prof-hero {
      position: relative; height: 220px; overflow: hidden;
      background: linear-gradient(135deg, #0d0f1a 0%, #110d05 40%, #0d0f1a 100%);
      transition: background .4s;
    }
    .prof-hero-glow { position: absolute; inset: 0; background: radial-gradient(ellipse 70% 120% at 50% 100%, var(--hero-glow, rgba(240,122,18,.18)) 0%, transparent 70%); transition: background .4s; }
    .prof-hero-grid { position: absolute; inset: 0; mask-image: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,.5) 60%, rgba(0,0,0,.1) 100%); }

    /* ── PATTERN PICKER ── */
    .pattern-presets { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
    .pattern-preset { width: 52px; height: 36px; border-radius: 8px; cursor: pointer; border: 2px solid rgba(255,255,255,.08); background: #06080d; overflow: hidden; position: relative; transition: all .15s; flex-shrink: 0; }
    .pattern-preset:hover { border-color: rgba(255,255,255,.2); transform: scale(1.05); }
    .pattern-preset.selected { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(240,122,18,.25); }
    .pattern-preset-inner { position: absolute; inset: 0; }
    .pattern-preset-label { position: absolute; bottom: 2px; left: 0; right: 0; text-align: center; font-size: .55rem; color: #5a6478; font-weight: 600; letter-spacing: .04em; }
    .prof-hero-orb { position: absolute; border-radius: 50%; filter: blur(70px); pointer-events: none; }
    .prof-hero-orb-1 { width: 340px; height: 340px; top: -100px; left: 8%; background: var(--orb1-color, rgba(240,122,18,.12)); transition: background .4s; }
    .prof-hero-orb-2 { width: 220px; height: 220px; top: -70px; right: 12%; background: var(--orb2-color, rgba(139,92,246,.08)); transition: background .4s; }

    /* ── PAGE ── */
    .prof-page { max-width: 820px; margin: 0 auto; padding: 0 20px 80px; }

    /* ── AVATAR ROW ── */
    .prof-avatar-lift { position: relative; margin-top: -56px; display: flex; align-items: flex-end; justify-content: space-between; padding: 0 4px; margin-bottom: 20px; }
    .prof-avatar-wrap { position: relative; }
    .prof-avatar { width: 112px; height: 112px; border-radius: 50%; border: 4px solid #04050a; object-fit: cover; background: #0e1119; display: block; box-shadow: 0 8px 32px rgba(0,0,0,.7); }
    .prof-avatar-ph { width: 112px; height: 112px; border-radius: 50%; border: 4px solid #04050a; background: #0e1119; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; color: #3a4050; box-shadow: 0 8px 32px rgba(0,0,0,.7); }
    .prof-online-ring { position: absolute; bottom: 6px; right: 6px; width: 20px; height: 20px; border-radius: 50%; background: #10b981; border: 3px solid #04050a; box-shadow: 0 0 10px rgba(16,185,129,.6); }

    /* ── ACTION BUTTONS ── */
    .prof-actions { display: flex; gap: 8px; align-items: center; padding-bottom: 8px; }
    .prof-btn { padding: 9px 20px; border-radius: 9px; font-size: .84rem; font-weight: 600; cursor: pointer; border: 1px solid rgba(255,255,255,.1); background: rgba(255,255,255,.06); color: #eef0f6; transition: all .15s; white-space: nowrap; }
    .prof-btn:hover { background: rgba(255,255,255,.1); border-color: rgba(255,255,255,.18); }
    .prof-btn:disabled { opacity: .5; cursor: not-allowed; }
    .prof-btn.primary { background: var(--accent); border-color: transparent; color: #fff; }
    .prof-btn.primary:hover { background: #e06a00; }
    .prof-btn.danger { border-color: rgba(239,68,68,.3); background: rgba(239,68,68,.08); color: #ef4444; }
    .prof-btn.danger:hover { background: rgba(239,68,68,.15); border-color: rgba(239,68,68,.5); }
    .prof-btn.following { background: rgba(240,122,18,.12); border-color: rgba(240,122,18,.3); color: #f07a12; }
    .prof-btn.following:hover { background: rgba(239,68,68,.1); border-color: rgba(239,68,68,.3); color: #ef4444; }

    /* ── IDENTITY ── */
    .prof-identity { margin-bottom: 24px; }
    .prof-name-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 4px; }
    .prof-display-name { font-size: 1.5rem; font-weight: 800; color: #fff; letter-spacing: -.02em; }
    .prof-role-chip { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 99px; font-size: .68rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; }
    .prof-role-chip[data-role="developer"] { background: rgba(139,92,246,.15); color: #a78bfa; border: 1px solid rgba(139,92,246,.3); }
    .prof-role-chip[data-role="staff"]     { background: rgba(59,130,246,.12); color: #60a5fa; border: 1px solid rgba(59,130,246,.25); }
    .prof-role-chip[data-role="vip"]       { background: rgba(234,179,8,.12); color: #fbbf24; border: 1px solid rgba(234,179,8,.25); }
    .prof-role-chip[data-role="customer"]  { background: rgba(240,122,18,.12); color: #f07a12; border: 1px solid rgba(240,122,18,.25); }
    .prof-role-chip[data-role="member"]    { background: rgba(255,255,255,.06); color: #7a8394; border: 1px solid rgba(255,255,255,.1); }
    .prof-handle { font-size: .88rem; color: #5a6478; margin-bottom: 12px; }
    .prof-bio { font-size: .9rem; color: #a0a8b8; line-height: 1.65; margin-bottom: 16px; max-width: 560px; }

    /* ── BADGES ── */
    .prof-badges { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px; }
    .prof-badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 11px; border-radius: 99px; font-size: .72rem; font-weight: 700; }
    .prof-badge.early_supporter { background: rgba(240,122,18,.12); color: #f07a12; border: 1px solid rgba(240,122,18,.2); }
    .prof-badge.yr1             { background: rgba(234,179,8,.1); color: #fbbf24; border: 1px solid rgba(234,179,8,.2); }
    .prof-badge.verified        { background: rgba(59,130,246,.1); color: #60a5fa; border: 1px solid rgba(59,130,246,.2); }
    .prof-badge.staff           { background: rgba(59,130,246,.1); color: #60a5fa; border: 1px solid rgba(59,130,246,.2); }
    .prof-badge.developer       { background: rgba(139,92,246,.1); color: #a78bfa; border: 1px solid rgba(139,92,246,.2); }
    .prof-badge.vip             { background: rgba(234,179,8,.1);  color: #fbbf24; border: 1px solid rgba(234,179,8,.2);  }
    .prof-badge.tester          { background: rgba(6,182,212,.1);  color: #22d3ee; border: 1px solid rgba(6,182,212,.2); }
    .prof-badge.og              { background: rgba(245,158,11,.1); color: #fbbf24; border: 1px solid rgba(245,158,11,.2); }

    /* ── STATS ROW ── */
    .prof-stats-row { display: flex; gap: 24px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
    .prof-stat { font-size: .88rem; color: #5a6478; }
    .prof-stat strong { color: #eef0f6; font-weight: 700; }
    .prof-stat a { color: #eef0f6; font-weight: 700; text-decoration: none; }
    .prof-stat a:hover { color: var(--accent); }
    .prof-stat-divider { width: 1px; height: 14px; background: rgba(255,255,255,.08); }
    .prof-last-seen { font-size: .78rem; color: #3a4050; display: flex; align-items: center; gap: 6px; }
    .prof-online-text { color: #10b981; font-weight: 600; }

    /* ── DIVIDER ── */
    .prof-divider { height: 1px; background: rgba(255,255,255,.06); margin: 0 0 28px; }

    /* ── INFO CARDS GRID ── */
    .prof-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; margin-bottom: 28px; }
    .prof-info-card {
      background: #0a0c14;
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 14px;
      padding: 18px 20px;
      display: flex; flex-direction: column; gap: 4px;
      transition: border-color .15s;
    }
    .prof-info-card:hover { border-color: rgba(255,255,255,.12); }
    .prof-info-card-icon { font-size: 1.1rem; margin-bottom: 4px; }
    .prof-info-card-label { font-size: .68rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: #3a4050; }
    .prof-info-card-value { font-size: 1rem; font-weight: 700; color: #eef0f6; }
    .prof-info-card-sub { font-size: .75rem; color: #5a6478; margin-top: 2px; }

    /* ── MUTUAL FOLLOWERS ── */
    .prof-mutual {
      background: #0a0c14;
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 14px;
      padding: 16px 20px;
      margin-bottom: 28px;
      display: flex; align-items: center; gap: 12px;
    }
    .prof-mutual-avatars { display: flex; }
    .prof-mutual-avatar { width: 28px; height: 28px; border-radius: 50%; border: 2px solid #0a0c14; object-fit: cover; background: #1a1f2e; margin-left: -8px; }
    .prof-mutual-avatars .prof-mutual-avatar:first-child { margin-left: 0; }
    .prof-mutual-text { font-size: .84rem; color: #7a8394; }
    .prof-mutual-text strong { color: #eef0f6; }

    /* ── TEAM CARD ── */
    .prof-team-card {
      position: relative; overflow: hidden;
      background: linear-gradient(135deg, #0d0f1a 0%, #0a0c14 100%);
      border-radius: 16px; padding: 24px 24px 22px;
      margin-bottom: 28px;
    }
    .prof-team-card-developer { border: 1px solid rgba(139,92,246,.3); }
    .prof-team-card-staff     { border: 1px solid rgba(59,130,246,.3); }
    .prof-team-card-vip       { border: 1px solid rgba(234,179,8,.3);  }
    .prof-team-glow { position: absolute; top: -40px; right: -40px; width: 200px; height: 200px; border-radius: 50%; filter: blur(60px); pointer-events: none; }
    .prof-team-glow-developer { background: rgba(139,92,246,.15); }
    .prof-team-glow-staff     { background: rgba(59,130,246,.14); }
    .prof-team-glow-vip       { background: rgba(234,179,8,.12);  }
    .prof-team-eyebrow { font-size: .68rem; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; margin-bottom: 6px; }
    .prof-team-eyebrow-developer { color: #a78bfa; }
    .prof-team-eyebrow-staff     { color: #60a5fa; }
    .prof-team-eyebrow-vip       { color: #fbbf24; }
    .prof-team-title { font-size: 1.05rem; font-weight: 800; color: #fff; margin-bottom: 8px; }
    .prof-team-desc  { font-size: .85rem; color: #a0a8b8; line-height: 1.6; }
    .prof-team-logo  { position: absolute; bottom: 18px; right: 22px; width: 36px; opacity: .12; }

    /* ── EDIT PANEL ── */
    .edit-panel { background: #0a0c14; border: 1px solid rgba(255,255,255,.07); border-radius: 16px; padding: 28px; margin-bottom: 28px; display: none; }
    .edit-section-title { font-size: .72rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: #5a6478; margin-bottom: 14px; }
    .edit-field { margin-bottom: 16px; }
    .edit-label { display: block; font-size: .73rem; font-weight: 600; color: #7a8394; margin-bottom: 6px; letter-spacing: .04em; text-transform: uppercase; }
    .edit-input { width: 100%; background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08); border-radius: 9px; color: #eef0f6; padding: 10px 14px; font-size: .88rem; outline: none; transition: border-color .15s; }
    .edit-input:focus { border-color: rgba(240,122,18,.4); background: rgba(240,122,18,.03); }
    .edit-input::placeholder { color: #3a4050; }
    textarea.edit-input { resize: vertical; min-height: 80px; font-family: inherit; line-height: 1.5; }
    .edit-char-count { font-size: .7rem; color: #3a4050; text-align: right; margin-top: 3px; }
    .privacy-grid { display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,.07); border-radius: 10px; overflow: hidden; }
    .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 13px 16px; border-bottom: 1px solid rgba(255,255,255,.05); transition: background .1s; }
    .toggle-row:last-child { border-bottom: none; }
    .toggle-row:hover { background: rgba(255,255,255,.02); }
    .toggle-info .toggle-label { font-size: .84rem; color: #c0c8d8; font-weight: 500; }
    .toggle-info .toggle-desc  { font-size: .73rem; color: #3a4050; margin-top: 2px; }
    .toggle { position: relative; display: inline-block; width: 38px; height: 21px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; inset: 0; background: rgba(255,255,255,.08); border-radius: 99px; cursor: pointer; transition: .2s; border: 1px solid rgba(255,255,255,.1); }
    .toggle-slider::before { content: ''; position: absolute; width: 15px; height: 15px; border-radius: 50%; background: #5a6478; left: 2px; top: 2px; transition: .2s; }
    .toggle input:checked + .toggle-slider { background: rgba(240,122,18,.25); border-color: rgba(240,122,18,.4); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(17px); background: var(--accent); }
    .edit-actions { display: flex; align-items: center; justify-content: flex-end; gap: 10px; margin-top: 20px; }
    .edit-msg { font-size: .8rem; margin-right: auto; }
    .edit-msg.ok  { color: #10b981; }
    .edit-msg.err { color: #ef4444; }

    /* ── COLOR PICKER ── */
    .color-presets { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
    .color-preset { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: all .15s; position: relative; }
    .color-preset:hover { transform: scale(1.15); }
    .color-preset.selected { border-color: #fff; box-shadow: 0 0 0 2px rgba(255,255,255,.3); }
    .color-preset.reset { background: rgba(255,255,255,.08); border: 2px dashed rgba(255,255,255,.2); display: flex; align-items: center; justify-content: center; color: #5a6478; font-size: .75rem; }
    .color-picker-wrap { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
    .color-picker-input { width: 44px; height: 36px; border: none; border-radius: 8px; cursor: pointer; padding: 2px; background: rgba(255,255,255,.06); }
    .color-picker-hex { background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08); border-radius: 8px; color: #eef0f6; padding: 8px 12px; font-size: .84rem; width: 110px; outline: none; font-family: monospace; }
    .color-picker-hex:focus { border-color: rgba(240,122,18,.4); }
    .color-unlock-note { font-size: .74rem; color: #5a6478; margin-top: 6px; }

    /* ── SOCIAL LINKS ── */
    .prof-socials { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .prof-social-btn { display: inline-flex; align-items: center; gap: 7px; padding: 7px 14px; border-radius: 9px; font-size: .8rem; font-weight: 600; text-decoration: none; border: 1px solid rgba(255,255,255,.08); background: rgba(255,255,255,.04); color: #a0a8b8; transition: all .15s; }
    .prof-social-btn:hover { background: rgba(255,255,255,.09); border-color: rgba(255,255,255,.16); color: #eef0f6; transform: translateY(-1px); }
    .prof-social-btn svg { flex-shrink: 0; }
    .social-inputs { display: flex; flex-direction: column; gap: 10px; margin-top: 6px; }
    .social-input-row { display: flex; align-items: center; gap: 10px; }
    .social-input-icon { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: #5a6478; }
    .social-input-field { flex: 1; background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08); border-radius: 9px; color: #eef0f6; padding: 8px 12px; font-size: .84rem; outline: none; transition: border-color .15s; }
    .social-input-field:focus { border-color: rgba(240,122,18,.4); background: rgba(240,122,18,.03); }
    .social-input-field::placeholder { color: #3a4050; }
    .social-input-label { width: 72px; font-size: .72rem; color: #5a6478; font-weight: 600; flex-shrink: 0; }

    /* ── USER LIST ── */
    .list-page-header { margin-bottom: 24px; }
    .list-page-title { font-size: 1.3rem; font-weight: 800; color: #fff; margin-bottom: 6px; }
    .list-page-sub { font-size: .84rem; color: #5a6478; }
    .list-page-sub a { color: #7a8394; text-decoration: none; }
    .list-page-sub a:hover { color: #eef0f6; }
    .user-list { display: flex; flex-direction: column; gap: 8px; }
    .user-list-item { display: flex; align-items: center; gap: 14px; padding: 14px 18px; background: #0a0c14; border: 1px solid rgba(255,255,255,.06); border-radius: 12px; text-decoration: none; color: #eef0f6; transition: all .15s; }
    .user-list-item:hover { background: rgba(255,255,255,.04); border-color: rgba(255,255,255,.1); transform: translateY(-1px); }
    .user-list-avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; background: #0e1119; flex-shrink: 0; }
    .user-list-info { flex: 1; min-width: 0; }
    .user-list-name { font-size: .9rem; font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-list-handle { font-size: .75rem; color: #5a6478; }
    .user-list-badges { display: flex; gap: 4px; margin-top: 5px; flex-wrap: wrap; }

    /* ── LOAD / ERR ── */
    .pload { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 340px; gap: 14px; color: #3a4050; }
    .pload-spinner { width: 30px; height: 30px; border: 2px solid rgba(255,255,255,.06); border-top-color: var(--accent); border-radius: 50%; animation: spin .65s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .pload span { font-size: .85rem; }
    .perr { text-align: center; padding: 80px 20px; }
    .perr-code { font-size: 4rem; font-weight: 900; color: rgba(255,255,255,.04); line-height: 1; margin-bottom: 16px; }
    .perr h2 { font-size: 1.2rem; color: #7a8394; margin-bottom: 8px; }
    .perr p { font-size: .85rem; color: #3a4050; margin-bottom: 24px; }
    .perr a { color: var(--accent); text-decoration: none; font-size: .84rem; }
  </style>
</head>
<body>

<nav class="pnav">
  <a href="/" class="pnav-logo"><img src="/assets/exon.png" alt="Exon"> Exon External</a>
  <div class="pnav-right">
    <a href="/" class="pnav-back">← Home</a>
    <img id="pnav-avatar" class="pnav-auth-avatar" src="" alt="" style="display:none" onclick="if(selfId)location.href='/u/'+selfId">
  </div>
</nav>

<div id="prof-root"></div>

<script>
const token     = localStorage.getItem('exon_token');
const pathParts = window.location.pathname.split('/').filter(Boolean);
const targetId  = pathParts[1] ?? null;
const subpage   = pathParts[2] ?? null;
let   selfId    = null;

// VIP preset colors
const VIP_PRESETS   = ['#f07a12','#f472b6','#a78bfa','#34d399','#60a5fa','#fbbf24','#fb7185','#38bdf8'];
// Staff/Dev get full picker + presets
const STAFF_PRESETS = [...VIP_PRESETS, '#e11d48','#7c3aed','#059669','#0284c7','#d97706','#dc2626','#6d28d9','#0f766e'];

const BADGE_META = {
  early_supporter: { label:'Early Supporter', emoji:'⭐', cls:'early_supporter' },
  '1_year_member': { label:'1 Year Member',   emoji:'🎂', cls:'yr1'            },
  verified:        { label:'Verified',         emoji:'✓',  cls:'verified'       },
  staff:           { label:'Staff',            emoji:'🛡', cls:'staff'          },
  developer:       { label:'Developer',        emoji:'⚒', cls:'developer'      },
  vip:             { label:'VIP',              emoji:'👑', cls:'vip'            },
  tester:          { label:'Beta Tester',      emoji:'🧪', cls:'tester'         },
  og:              { label:'OG Member',        emoji:'🏆', cls:'og'             },
};

function esc(s){ return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function relTime(ts) {
  if (!ts) return null;
  const d = Date.now() - ts;
  if (d < 60000)      return 'Online now';
  if (d < 3600000)    return Math.floor(d/60000)   + 'm ago';
  if (d < 86400000)   return Math.floor(d/3600000)  + 'h ago';
  if (d < 2592000000) return Math.floor(d/86400000) + 'd ago';
  return new Date(ts).toLocaleDateString();
}

function memberSince(createdAt) {
  if (!createdAt) return { label: 'Unknown', sub: '' };
  const ms   = Date.now() - createdAt * 1000;
  const days = Math.floor(ms / 86400000);
  if (days < 1)   return { label: 'Today',             sub: new Date(createdAt*1000).toLocaleDateString() };
  if (days < 30)  return { label: days + ' days',       sub: new Date(createdAt*1000).toLocaleDateString() };
  if (days < 365) return { label: Math.floor(days/30) + ' months', sub: new Date(createdAt*1000).toLocaleDateString() };
  const yrs = (days/365).toFixed(1);
  return { label: yrs + ' years', sub: new Date(createdAt*1000).toLocaleDateString() };
}

function badgeHtml(badge) {
  const m = BADGE_META[badge]; if (!m) return '';
  return `<span class="prof-badge ${m.cls}">${m.emoji} ${m.label}</span>`;
}

function applyHeroPattern(pattern) {
  const el = document.getElementById('prof-hero-grid');
  if (!el) return;
  el.style.cssText = HERO_PATTERNS[pattern] ?? HERO_PATTERNS.grid;
}

function applyAccentColor(hex) {
  if (!hex) { document.documentElement.style.removeProperty('--hero-glow'); document.documentElement.style.removeProperty('--orb1-color'); document.documentElement.style.removeProperty('--orb2-color'); return; }
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  document.documentElement.style.setProperty('--hero-glow', `rgba(${r},${g},${b},.2)`);
  document.documentElement.style.setProperty('--orb1-color', `rgba(${r},${g},${b},.14)`);
  document.documentElement.style.setProperty('--orb2-color', `rgba(${r},${g},${b},.07)`);
}

// ── Boot ──────────────────────────────────────────────────────────────────────

let resolvedId = null; // actual discord_id after vanity resolution

async function boot() {
  if (token) {
    fetch('/api/me', { headers: { Authorization: `Bearer ${token}` } })
      .then(r => r.ok ? r.json() : null).then(u => {
        if (!u) return;
        selfId = u.discord_id;
        const av = document.getElementById('pnav-avatar');
        av.src = u.avatar ?? ''; av.style.display = 'block';
      }).catch(()=>{});
  }
  if (!targetId) { renderError('No user specified.'); return; }

  // Resolve vanity slug → discord_id if not already a numeric ID
  if (/^\d{15,20}$/.test(targetId)) {
    resolvedId = targetId;
  } else {
    try {
      const r = await fetch(`/api/resolve/${encodeURIComponent(targetId)}`);
      if (!r.ok) { renderError('This user does not exist or their profile is private.'); return; }
      const d = await r.json();
      resolvedId = d.discord_id;
    } catch { renderError('Failed to load profile. Please try again.'); return; }
  }

  if (subpage === 'followers' || subpage === 'following') { await renderListPage(subpage); return; }
  await renderProfilePage();
}

// ── Profile Page ──────────────────────────────────────────────────────────────

async function renderProfilePage() {
  const root = document.getElementById('prof-root');
  try {
    const headers = token ? { Authorization: `Bearer ${token}` } : {};
    const res     = await fetch(`/api/profile/${encodeURIComponent(resolvedId)}`, { headers });
    if (res.status === 404) { renderError('This user does not exist or their profile is private.'); return; }
    const u = await res.json();
    document.title = `${u.display_name} — Exon External`;

    // Apply accent color and pattern to hero
    if (u.accent_color) applyAccentColor(u.accent_color);
    applyHeroPattern(u.hero_pattern ?? 'grid');

    const isOwner  = u.is_owner ?? false;
    const lastSeen = u.last_seen ? relTime(u.last_seen) : null;
    const isOnline = u.last_seen && (Date.now() - u.last_seen) < 5 * 60 * 1000;

    const avatarHtml = u.avatar
      ? `<img src="${esc(u.avatar)}" class="prof-avatar" alt="">`
      : `<div class="prof-avatar-ph">?</div>`;
    const onlineRing = (lastSeen && isOnline) ? `<div class="prof-online-ring"></div>` : '';

    const badgesHtml = (u.badges ?? []).map(badgeHtml).filter(Boolean).join('');

    const followersHtml = u.show_follower_count
      ? `<a href="/u/${esc(targetId)}/followers"><strong>${u.follower_count}</strong> follower${u.follower_count!==1?'s':''}</a>`
      : `<strong>${u.follower_count}</strong> follower${u.follower_count!==1?'s':''}`;
    const followingHtml = u.show_follower_count
      ? `<a href="/u/${esc(targetId)}/following"><strong>${u.following_count}</strong> following</a>`
      : `<strong>${u.following_count}</strong> following`;

    const seenHtml = lastSeen ? `<div class="prof-last-seen" style="margin-top:8px">${
      isOnline
        ? `<svg width="8" height="8" viewBox="0 0 8 8"><circle cx="4" cy="4" r="4" fill="#10b981"/></svg><span class="prof-online-text">Online now</span>`
        : `<svg width="8" height="8" viewBox="0 0 8 8"><circle cx="4" cy="4" r="4" fill="#3a4050"/></svg>Last seen ${lastSeen}`
    }</div>` : '';

    // Action buttons
    let actionHtml = '';
    if (!isOwner && token) {
      actionHtml += u.is_following

    }

    actionHtml += `<button class="prof-btn" onclick="copyProfileLink('${esc(profileUrl)}')" title="Copy profile link">🔗</button>`;

  } catch(e) {
    console.error(e);
    renderError('Failed to load profile. Please try again.');
  }
}

// ── Edit panel ────────────────────────────────────────────────────────────────

function editPanelHtml(u) {
  const p    = u.privacy ?? {};
  const role = u.role ?? 'member';
  const canColor   = u.can_edit_color;
  const fullColor  = u.full_color;
  const presets    = fullColor ? STAFF_PRESETS : VIP_PRESETS;
  const current    = u.accent_color ?? null;

  function row(key, label, desc) {
    return `<div class="toggle-row">
      <div class="toggle-info"><div class="toggle-label">${label}</div><div class="toggle-desc">${desc}</div></div>
      <label class="toggle"><input type="checkbox" id="priv-${key}" ${p[key]?'checked':''}><span class="toggle-slider"></span></label>
    </div>`;
  }

  const patternSection = `
    <div class="edit-section-title" style="margin-top:20px">Hero Pattern</div>
    <div class="pattern-presets" id="pattern-presets">
      ${Object.entries(HERO_PATTERNS).map(([key, css]) => `
        <div class="pattern-preset ${(u.hero_pattern??'grid')===key?'selected':''}" data-pattern="${key}" onclick="selectPattern('${key}')" title="${PATTERN_LABELS[key]}">
          <div class="pattern-preset-inner" style="${css};opacity:.7"></div>
          <div class="pattern-preset-label">${PATTERN_LABELS[key]}</div>
        </div>`).join('')}
    </div>`;

  const colorSection = canColor ? `
    <div class="edit-section-title" style="margin-top:20px">Profile Color ${fullColor ? '' : '<span style="color:#f472b6;font-size:.65rem">VIP</span>'}</div>
    <div class="color-presets" id="color-presets">
      <div class="color-preset reset" id="color-reset" onclick="selectColor(null)" title="Default">✕</div>
      ${presets.map(c => `<div class="color-preset" style="background:${c}" data-color="${c}" onclick="selectColor('${c}')" title="${c}"></div>`).join('')}
    </div>
    ${fullColor ? `<div class="color-picker-wrap">
      <input type="color" class="color-picker-input" id="color-picker-input" value="${current ?? '#f07a12'}" oninput="selectColor(this.value)">
      <input type="text" class="color-picker-hex" id="color-hex" value="${current ?? ''}" placeholder="#f07a12" maxlength="7" oninput="onHexInput(this.value)">
    </div>` : ''}
    <div class="color-unlock-note">${fullColor ? 'Full color picker available for Staff & Developers.' : 'Staff & Developer unlock full color picker.'}</div>
  ` : `
    <div class="color-unlock-note" style="margin-top:4px">🎨 Profile color customization unlocks at VIP.</div>
  `;

  const vanitySection = canColor ? `
    <div class="edit-field">
      <label class="edit-label">Vanity URL <span style="color:#5a6478;font-weight:400;text-transform:none;font-size:.7rem">exoncheats.com/u/yourname</span></label>
      <input class="edit-input" id="edit-vanity" type="text" maxlength="24" value="${esc(u.vanity ?? '')}" placeholder="yourname" oninput="this.value=this.value.toLowerCase().replace(/[^a-z0-9_]/g,'')">
      <div class="edit-char-count">3–24 chars, a–z 0–9 _</div>
    </div>` : '';

  const teamDescSection = fullColor ? `
    <div class="edit-field" style="margin-top:4px">
      <label class="edit-label">Team Description</label>
      <textarea class="edit-input" id="edit-team-desc" maxlength="600" placeholder="Describe your role on the team…" oninput="countChars('edit-team-desc','td-count',600)">${esc(u.team_description ?? '')}</textarea>
      <div class="edit-char-count"><span id="td-count">${(u.team_description??'').length}</span>/600</div>
    </div>` : '';

  return `<div class="edit-panel" id="edit-panel">
    <div class="edit-section-title">Profile</div>
    <div class="edit-field">
      <label class="edit-label">Display Name</label>
      <input class="edit-input" id="edit-display-name" type="text" maxlength="32" value="${esc(u.display_name??u.username)}" oninput="countChars('edit-display-name','dn-count',32)">
      <div class="edit-char-count"><span id="dn-count">${(u.display_name??u.username??'').length}</span>/32</div>
    </div>
    <div class="edit-field">
      <label class="edit-label">Bio</label>
      <textarea class="edit-input" id="edit-bio" maxlength="600" placeholder="Tell others about yourself" oninput="countChars('edit-bio','bio-count',600)">${esc(u.bio??'')}</textarea>
      <div class="edit-char-count"><span id="bio-count">${(u.bio??'').length}</span>/600</div>
    </div>
    ${teamDescSection}
    ${vanitySection}
    ${patternSection}
    ${colorSection}
    <div class="edit-section-title" style="margin-top:20px">Social Links</div>
    <div class="social-inputs">
      ${Object.entries(SOCIAL_PLATFORMS).map(([k, p]) => `
        <div class="social-input-row">
          <div class="social-input-icon" style="color:${p.color}">${p.icon}</div>
          <div class="social-input-label">${p.label}</div>
          <input class="social-input-field" id="social-${k}" type="text" placeholder="${p.placeholder}" value="${esc((u.social_links ?? {})[k] ?? '')}">
        </div>`).join('')}
    </div>
    <div class="edit-section-title" style="margin-top:20px">Privacy</div>
    <div class="privacy-grid">
      ${row('show_subscription',   'Show subscription status', 'Visitors can see if you have an active subscription')}
      ${row('show_time_remaining', 'Show time remaining',      'Display how much time is left on your subscription')}
      ${row('show_key_count',      'Show key count',           'Show how many keys you have linked')}
      ${row('show_follower_count', 'Show follower lists',      'Allow others to browse your followers and following')}
      ${row('show_online_status',  'Show online status',       'Let others see your last seen / online indicator')}
    </div>
    <div class="edit-actions">
      <span class="edit-msg" id="edit-msg"></span>
      <button class="prof-btn" onclick="toggleEdit()">Cancel</button>
      <button class="prof-btn primary" onclick="saveProfile()">Save changes</button>
    </div>
  </div>`;
}

let _selectedColor   = null;
let _selectedPattern = 'grid';

function wireEditPanel(u) {
  _selectedColor   = u.accent_color ?? null;
  _selectedPattern = u.hero_pattern ?? 'grid';
  document.querySelectorAll('.color-preset[data-color]').forEach(el => {
    el.classList.toggle('selected', el.dataset.color === _selectedColor);
  });
  if (_selectedColor === null) {
    document.getElementById('color-reset')?.classList.add('selected');
  }
}

function selectPattern(key) {
  _selectedPattern = key;
  document.querySelectorAll('.pattern-preset').forEach(el => {
    el.classList.toggle('selected', el.dataset.pattern === key);
  });
  applyHeroPattern(key);
}

function selectColor(hex) {
  _selectedColor = hex;
  document.querySelectorAll('.color-preset').forEach(el => el.classList.remove('selected'));
  if (hex === null) {
    document.getElementById('color-reset')?.classList.add('selected');
    applyAccentColor(null);
  } else {
    document.querySelector(`.color-preset[data-color="${hex}"]`)?.classList.add('selected');
    const inp = document.getElementById('color-picker-input');
    const hexEl = document.getElementById('color-hex');
    if (inp) inp.value = hex;
    if (hexEl) hexEl.value = hex;
    applyAccentColor(hex);
  }
}

function onHexInput(val) {
  if (/^#[0-9a-fA-F]{6}$/.test(val)) selectColor(val);
}

function countChars(inputId, countId, max) {
  const el = document.getElementById(countId);
  if (el) el.textContent = (document.getElementById(inputId)?.value ?? '').length;
}

function toggleEdit() {
  const panel = document.getElementById('edit-panel');
  const btn   = document.getElementById('edit-toggle-btn');
  if (!panel) return;
  const open = panel.style.display !== 'block';
  panel.style.display = open ? 'block' : 'none';
  if (btn) btn.textContent = open ? 'Cancel' : 'Edit Profile';
}

async function saveProfile() {
  const display_name    = document.getElementById('edit-display-name')?.value?.trim();
  const bio             = document.getElementById('edit-bio')?.value?.trim();
  const team_description = document.getElementById('edit-team-desc')?.value?.trim();
  const privKeys        = ['show_subscription','show_time_remaining','show_key_count','show_follower_count','show_online_status'];
  const privacy         = {};
  privKeys.forEach(k => { const el = document.getElementById(`priv-${k}`); if (el) privacy[k] = el.checked; });

  // Collect social links
  const social_links = {};
  Object.keys(SOCIAL_PLATFORMS).forEach(k => {
    const el = document.getElementById(`social-${k}`);
    if (el) { const v = el.value.trim(); if (v) social_links[k] = v; }
  });

  const vanityEl = document.getElementById('edit-vanity');
  const msgEl = document.getElementById('edit-msg');
  const body  = { display_name, bio, privacy, accent_color: _selectedColor, hero_pattern: _selectedPattern, social_links };
  if (team_description !== undefined) body.team_description = team_description;
  if (vanityEl) body.vanity = vanityEl.value.trim() || null;

  try {
    const res = await fetch('/api/profile', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify(body),
    });
    if (res.ok) {
      if (msgEl) { msgEl.textContent = '✓ Saved!'; msgEl.className = 'edit-msg ok'; }
      setTimeout(() => renderProfilePage(), 800);
    } else {
      const d = await res.json().catch(()=>({}));
      if (msgEl) { msgEl.textContent = d.error ?? 'Error saving.'; msgEl.className = 'edit-msg err'; }
    }
  } catch {
    if (msgEl) { msgEl.textContent = 'Network error.'; msgEl.className = 'edit-msg err'; }
  }
}

function socialLinksHtml(links) {
  const entries = Object.entries(links ?? {}).filter(([k, v]) => v && SOCIAL_PLATFORMS[k]);
  if (!entries.length) return '';
  const btns = entries.map(([k, v]) => {
    const p = SOCIAL_PLATFORMS[k];
    return `<a class="prof-social-btn" href="${esc(p.url(v))}" target="_blank" rel="noopener" style="--sc:${p.color}">
      <span style="color:${p.color}">${p.icon}</span>${esc(p.label)}
    </a>`;
  }).join('');
  return `<div class="prof-socials">${btns}</div>`;
}

function copyProfileLink(url) {
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.querySelector('.prof-btn[onclick^="copyProfileLink"]');
    if (btn) { const orig = btn.textContent; btn.textContent = '✓ Copied'; setTimeout(() => btn.textContent = orig, 1500); }
  });
}

// ── Follow / Block ────────────────────────────────────────────────────────────

async function toggleFollow(doFollow) {
  const btn = document.getElementById('follow-btn');
  if (btn) btn.disabled = true;
  try {
    const res = await fetch(`/api/follow/${encodeURIComponent(resolvedId)}`, {
      method: doFollow ? 'POST' : 'DELETE', headers: { Authorization: `Bearer ${token}` },
    });
    if (res.ok) await renderProfilePage(); else if (btn) btn.disabled = false;
  } catch { if (btn) btn.disabled = false; }
}

async function blockUser() {
  if (!confirm('Block this user? They will no longer be able to see your profile.')) return;
  try {
    await fetch(`/api/block/${encodeURIComponent(resolvedId)}`, { method: 'POST', headers: { Authorization: `Bearer ${token}` } });
    window.location.href = '/';
  } catch {}
}

// ── List page ─────────────────────────────────────────────────────────────────

async function renderListPage(type) {
  const root = document.getElementById('prof-root');
  root.innerHTML = `<div class="prof-page"><div class="pload"><div class="pload-spinner"></div></div></div>`;
  try {
    const headers = token ? { Authorization: `Bearer ${token}` } : {};
    const res     = await fetch(`/api/${type}/${encodeURIComponent(targetId)}`, { headers });
    if (res.status === 403) { renderError('This list is private.'); return; }
    if (!res.ok) { renderError('Could not load list.'); return; }
    const data  = await res.json();
    const items = data.followers ?? data.following ?? [];
    const label = type === 'followers' ? 'Followers' : 'Following';
    document.title = `${label} — Exon External`;

    const listHtml = items.length
      ? items.map(u => `
        <a class="user-list-item" href="/u/${esc(u.discord_id)}">
          ${u.avatar ? `<img src="${esc(u.avatar)}" class="user-list-avatar" alt="">` : '<div class="user-list-avatar"></div>'}
          <div class="user-list-info">
            <div class="user-list-name">${esc(u.display_name || u.username)}</div>
            <div class="user-list-handle">@${esc(u.username)}</div>
            ${(u.badges??[]).length ? `<div class="user-list-badges">${u.badges.slice(0,3).map(badgeHtml).join('')}</div>` : ''}
          </div>
          <span class="prof-role-chip" data-role="${esc(u.role)}" style="font-size:.65rem">${esc(u.role)}</span>
        </a>`).join('')
      : `<div style="text-align:center;padding:60px 20px;color:#3a4050;font-size:.88rem">No one here yet.</div>`;

    root.innerHTML = `
      <div class="prof-page">
        <div class="list-page-header">
          <div class="list-page-title">${label}</div>
          <div class="list-page-sub"><a href="/u/${esc(targetId)}">← Back to profile</a></div>
        </div>
        <div class="user-list">${listHtml}</div>
      </div>`;
  } catch { renderError('Failed to load list.'); }
}

// ── Error ─────────────────────────────────────────────────────────────────────

function renderError(msg) {
  document.getElementById('prof-root').innerHTML = `
    <div class="prof-page">
      <div class="perr">
        <div class="perr-code">404</div>
        <h2>Not found</h2>
        <p>${esc(msg)}</p>
        <a href="/">← Go home</a>
      </div>
    </div>`;
}

boot();
</script>
</body>
